<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESHD L&S 파라변경/부동내역 공유 양식 (L-H 전용)</title>

  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background-color: #4a4a4a;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 8px 8px 0 0;
    }
    .tab-container {
      display: flex;
      background-color: #e0e0e0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 15px;
      cursor: pointer;
      font-weight: bold;
    }
    .tab.active { background-color: white; }
    .form-container {
      background-color: white;
      padding: 20px;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .form { display: none; }
    .form.active { display: block; }
    .form-group { margin-bottom: 15px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    textarea {
      height: 110px;
      resize: vertical;
    }
    .button {
      background-color: #4a4a4a;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
    }
    .button:hover { background-color: #5a5a5a; }

    #uploadButton {
      background-color: #28a745;
      color: white;
    }

    .footer {
      text-align: right;
      padding: 10px;
      font-size: 12px;
      color: #666;
      margin-top: 20px;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
      white-space: pre-wrap;
    }

    .alert-box {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background-color: #333;
      color: white;
      border-radius: 10px;
      z-index: 1000;
      display: none;
      opacity: 0;
      transition: opacity 0.25s ease-in-out;
      white-space: pre-line;
      text-align: center;
      max-width: 92%;
      line-height: 1.35;
    }
    .alert-box.show { display: block; opacity: 1; }

    #resultText {
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>ESHD L&S 파라변경이력 / 부동내역 양식</h1>
      <p>Parameter 변경이력 및 부동&작업내역 입력 (L-H 전용)</p>
    </div>

    <div class="tab-container">
      <div class="tab" onclick="switchTab('parameterForm')">Para/IP 변경공유</div>
      <div class="tab active" onclick="switchTab('troubleForm')">부동내역 공유</div>
    </div>

    <div class="form-container">
      <!-- =========================
           Para/IP 변경 폼
      ========================== -->
      <div id="parameterForm" class="form">
        <div class="form-group">
          <label for="para-site">0. Site (site) :</label>
          <select id="para-site">
            <option value="L-H">L-H</option>
          </select>
        </div>

        <div class="form-group">
          <label for="para-machine">1. 호기(machine) :</label>
          <select id="para-machine"></select>
        </div>

        <div class="form-group">
          <label for="para-process">2-1. 공정(process) :</label>
          <select id="para-process"></select>
        </div>

        <div class="form-group">
          <label for="para-unit">2-2. 유닛(unit) :</label>
          <select id="para-unit">
            <option value="-">-</option>
          </select>
        </div>

        <div class="form-group">
          <label for="para-assy">2-3. 어셈블리(assy) :</label>
          <select id="para-assy">
            <option value="-">-</option>
          </select>
        </div>

        <div class="form-group">
          <label for="para-time">3. 변경시간(change time) :</label>
          <input type="datetime-local" id="para-time" />
        </div>

        <div class="form-group">
          <label for="para-worker">4. 변경자(worker) :</label>
          <input type="text" id="para-worker" placeholder="작업자 이름 / Worker name" />
        </div>

        <div class="form-group">
          <label for="para-parameter">5. 변경Para(parameter) :</label>
          <input type="text" id="para-parameter" placeholder="변경 파라미터 / Parameter" />
        </div>

        <div class="form-group">
          <label for="para-before">6. 이전값(before) :</label>
          <input type="text" id="para-before" placeholder="이전 값 / Before" />
        </div>

        <div class="form-group">
          <label for="para-after">7. 변경값(after) :</label>
          <input type="text" id="para-after" placeholder="변경 값 / After" />
        </div>

        <div class="form-group">
          <label for="para-reason">8. 변경사유(reason) :</label>
          <textarea id="para-reason" placeholder="변경 사유 / Reason"></textarea>
        </div>

        <button class="button" onclick="generateParameterText()">양식 생성하기 (Generate)</button>
      </div>

      <!-- =========================
           Trouble 폼
      ========================== -->
      <div id="troubleForm" class="form active">
        <div class="form-group">
          <label for="trouble-type">종류(type) :</label>
          <select id="trouble-type">
            <option value="BM">BM</option>
            <option value="PD">PD</option>
            <option value="PM">PM</option>
            <option value="생산준비">생산준비</option>
          </select>
        </div>

        <div class="form-group">
          <label for="trouble-site">0. Site (site) :</label>
          <select id="trouble-site">
            <option value="L-H">L-H</option>
          </select>
        </div>

        <div class="form-group">
          <label for="trouble-machine">1. 호기(machine) :</label>
          <select id="trouble-machine"></select>
        </div>

        <div class="form-group">
          <label for="trouble-process">2-1. 공정(process) :</label>
          <select id="trouble-process"></select>
        </div>

        <div class="form-group">
          <label for="trouble-unit">2-2. 유닛(unit) :</label>
          <select id="trouble-unit">
            <option value="-">-</option>
          </select>
        </div>

        <div class="form-group">
          <label for="trouble-assy">2-3. 어셈블리(assy) :</label>
          <select id="trouble-assy">
            <option value="-">-</option>
          </select>
        </div>

        <div class="form-group">
          <label for="trouble-time">3-1. 발생시간(start time) :</label>
          <input type="datetime-local" id="trouble-time" />
        </div>

        <div class="form-group">
          <label for="trouble-complete">3-2. 조치완료(complete time) :</label>
          <input type="datetime-local" id="trouble-complete" />
        </div>

        <div class="form-group">
          <label for="trouble-worker">4. 작업자(worker) :</label>
          <input type="text" id="trouble-worker" placeholder="작업자 이름 / Worker name" required />
        </div>

        <div class="form-group">
          <label for="trouble-problem">5. 현상(symptom) :</label>
          <textarea id="trouble-problem" placeholder="현상 입력 / Symptom"></textarea>
        </div>

        <div class="form-group">
          <label for="trouble-reason">6. 원인(cause) :</label>
          <textarea id="trouble-reason" placeholder="원인 입력 / Cause"></textarea>
        </div>

        <div class="form-group">
          <label for="trouble-action">7. 조치(action) :</label>
          <textarea id="trouble-action" placeholder="조치 내용 입력 / Action"></textarea>
        </div>

        <button class="button" onclick="generateTroubleText()">양식 생성하기 (Generate)</button>
      </div>

      <!-- 결과 표시 -->
      <div id="result" class="result">
        <p id="resultText"></p>
        <button id="uploadButton" class="button" onclick="uploadAndAutoCopy()">
          업로드 + 자동 클립보드 복사 (Upload + Auto Copy)
        </button>

      <div id="status-alert" class="alert-box">
        <span id="alert-message"></span>
      </div>
    </div>

    <div class="footer">@</div>

    /***********************
     * ✅ GAS URL (최신)
     ***********************/
    const GOOGLE_SCRIPT_URL =

    /***********************
     * ✅ L-H 전용 값
     ***********************/
    const PROCESS_LIST = ['Electrode Supply', 'Lamination', 'D-Stacking', 'Taper', 'Inspection'];

    const LH_MACHINES = [
      '-', '1-1','1-2','1-3',
      '2-1','2-2','2-3',
      '3-1','3-2','3-3',
      '4-1','4-2','4-3',

      '6-1','6-2','6-3','6-4',
      'HC1','HC2'

    /***********************
     * UI 유틸
     ***********************/
    function showToast(text) {
      const box = document.getElementById('status-alert');
      const msg = document.getElementById('alert-message');
      msg.innerText = text;
      box.classList.add('show');
      setTimeout(() => box.classList.remove('show'), 5500);
    }

    function setOptions(selectId, options) {
      const el = document.getElementById(selectId);
      el.innerHTML = '';
      options.forEach(v => el.appendChild(new Option(v, v)));
      el.value = options[0] ?? '-';
    }

    function setProcessOptions(selectId) {
      const el = document.getElementById(selectId);
      el.innerHTML = '';
      el.appendChild(new Option('-', '-'));
      PROCESS_LIST.forEach(p => el.appendChild(new Option(p, p)));
      el.value = '-';
    }

    function setCurrentDateTime(elementId) {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById(elementId).value = `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function formatDateTime(dateTimeStr) {
      if (!dateTimeStr) return '';
      const date = new Date(dateTimeStr);
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? '오후' : '오전';
      const hour12 = hours % 12 || 12;
      return `${year}년 ${month}월 ${day}일 ${ampm} ${hour12}:${minutes}`;
    }

    function switchTab(formId) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));

      if (formId === 'parameterForm') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('parameterForm').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('troubleForm').classList.add('active');
      }
      document.getElementById('result').style.display = 'none';
    }

    /***********************
     * ✅ 결과 텍스트 자동 선택(하이라이트)
     ***********************/
    function selectResultText() {
      const el = document.getElementById('resultText');
      if (!el || !el.innerText) return;
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    /***********************
     * ✅ 클립보드 복사(카톡 인앱 대응)
     ***********************/
    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      try { document.execCommand("copy"); } catch (err) {}
      document.body.removeChild(textarea);
    }

    async function copyTextSafe(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
      } catch (e) {
        fallbackCopy(text);
      }
    }

    /***********************
     * 공정 → 유닛 (L-H = 기존 else 로직)
     ***********************/
    function fillUnitOptions(unitSelect, process) {
      unitSelect.innerHTML = '';
      let options = [];

      if (process === 'Electrode Supply') {
        options = ['-', 'Pancake.Loader'];
      } else if (process === 'Lamination') {
        options = ['-', 'Separator. Unwinder', 'Electrode/Separator.Combiner', 'Laminator', 'Cell.FinalCutter', 'Cell.TrackingSystem', 'Cell.Inspector', 'Cell.Unloader'];
      } else if (process === 'D-Stacking') {
        options = ['-', '[01]Cell.Loading C/V', '[02]Cell.Loading C/V', '[01]Cell.Stacker', '[02]Cell.Stacker', '[03]Cell.Stacker', 'Stacked Cell.Transfer'];
      } else if (process === 'Taper') {
        options = ['-', 'HalfCell.Loading', 'HalfCell.Stack', 'LMS', '[01]StackedCell.Taper', '[02]StackedCell.Taper'];
      } else if (process === 'Inspection') {
        options = ['-', 'TapedCell.Vision', 'TapedCell.Rotate', 'TapedCell.ShortInspector', 'Cell.TrackingSystem', 'TapedCell.Transfer', 'TapedCell.Unloader'];
      } else {
        options = ['-'];
      }

      options.forEach(opt => unitSelect.appendChild(new Option(opt, opt)));
      unitSelect.value = '-';
    }

    document.getElementById('para-process').addEventListener('change', function () {
      fillUnitOptions(document.getElementById('para-unit'), this.value);
      document.getElementById('para-assy').innerHTML = '<option value="-">-</option>';
    });

    document.getElementById('trouble-process').addEventListener('change', function () {
      fillUnitOptions(document.getElementById('trouble-unit'), this.value);
      document.getElementById('trouble-assy').innerHTML = '<option value="-">-</option>';
    });

    function fillAssyOptions(assySelect, unit) {
      const list = ASSY_MAP[unit] || ['-'];
      assySelect.innerHTML = '';
      list.forEach(opt => assySelect.appendChild(new Option(opt, opt)));
      assySelect.value = '-';
    }

    document.getElementById('para-unit').addEventListener('change', function () {
      fillAssyOptions(document.getElementById('para-assy'), this.value);
    });

    document.getElementById('trouble-unit').addEventListener('change', function () {
      fillAssyOptions(document.getElementById('trouble-assy'), this.value);
    });

    /***********************
     * 시간 제약 (현재 +24h)
     ***********************/
    const startEl = document.getElementById('trouble-time');
    const completeEl = document.getElementById('trouble-complete');

    function getMaxIso() {
      const now = new Date();
      const plusOne = new Date(now.getTime() + 24 * 60 * 60 * 1000);
      return plusOne.toISOString().slice(0, 16);
    }

    function updateMaxConstraints() {
      const maxIso = getMaxIso();
      startEl.max = maxIso;
      completeEl.max = maxIso;

      if (startEl.value && startEl.value > maxIso) {
        startEl.value = maxIso;
        alert('⚠️ 발생시간은 현재 시각부터 24시간 이내 / Start time within 24h');
      }
      if (completeEl.value && completeEl.value > maxIso) {
        completeEl.value = maxIso;
        alert('⚠️ 조치완료는 현재 시각부터 24시간 이내 / Complete time within 24h');
      }
    }

    startEl.addEventListener('change', () => {
      completeEl.min = startEl.value;
      updateMaxConstraints();
    });

    completeEl.addEventListener('change', () => {
      updateMaxConstraints();
      if (completeEl.value < startEl.value) {
        completeEl.value = startEl.value;
        alert('⚠️ 조치완료는 발생시간 이후 / Complete must be after start');
      }
    });

    /***********************
     * 텍스트 생성
     ***********************/
    function generateParameterText() {
      const site = document.getElementById('para-site').value;
      const machine = document.getElementById('para-machine').value;
      const process = document.getElementById('para-process').value;
      const unit = document.getElementById('para-unit').value;
      const assy = document.getElementById('para-assy').value;
      const time = formatDateTime(document.getElementById('para-time').value);
      const parameter = document.getElementById('para-parameter').value;
      const before = document.getElementById('para-before').value;
      const after = document.getElementById('para-after').value;
      const worker = document.getElementById('para-worker').value;
      const reason = document.getElementById('para-reason').value;

      let text = `♣파라미터, IP 변경 공유 (Parameter/IP Change)\n`;
      text += `종류(type): Para/IP 변경\n`;
      text += `0. Site (site) : ${site}\n`;
      text += `1. 호기(machine) : ${machine}\n`;
      text += `2-1. 공정(process) : ${process}\n`;
      text += `2-2. 유닛(unit) : ${unit}\n`;
      text += `2-3. 어셈블리(assy) : ${assy}\n`;
      text += `3. 변경시간(change time) : ${time}\n`;
      text += `4. 변경자(worker) : ${worker}\n`;
      text += `5. 변경Para(parameter) : ${parameter}\n`;
      text += `6. 이전값(before) : ${before}\n`;
      text += `7. 변경값(after) : ${after}\n`;
      text += `8. 변경사유(reason) : ${reason}`;

      document.getElementById('resultText').innerText = text;
      document.getElementById('result').style.display = 'block';
      setTimeout(selectResultText, 0);
    }

    function generateTroubleText() {
      const type = document.getElementById('trouble-type').value;
      const site = document.getElementById('trouble-site').value;
      const machine = document.getElementById('trouble-machine').value;
      const process = document.getElementById('trouble-process').value;
      const unit = document.getElementById('trouble-unit').value;
      const assy = document.getElementById('trouble-assy').value;
      const time = formatDateTime(document.getElementById('trouble-time').value);
      const complete = formatDateTime(document.getElementById('trouble-complete').value);
      const worker = document.getElementById('trouble-worker').value;
      const problem = document.getElementById('trouble-problem').value;
      const reason = document.getElementById('trouble-reason').value;
      const action = document.getElementById('trouble-action').value;

      let text = `[부동&작업 공유 (Downtime/Work Share)]\n`;
      text += `종류(type): ${type}\n`;
      text += `0. Site (site) : ${site}\n`;
      text += `1. 호기(machine) : ${machine}\n`;
      text += `2-1. 공정(process) : ${process}\n`;
      text += `2-2. 유닛(unit) : ${unit}\n`;
      text += `2-3. 어셈블리(assy) : ${assy}\n`;
      text += `3-1. 발생시간(start time) : ${time}\n`;
      text += `3-2. 조치완료(complete time) : ${complete}\n`;
      text += `4. 작업자(worker) : ${worker}\n`;
      text += `5. 현상(symptom) : ${problem}\n`;
      text += `6. 원인(cause) : ${reason}\n`;
      text += `7. 조치(action) : ${action}`;

      document.getElementById('resultText').innerText = text;
      document.getElementById('result').style.display = 'block';
      setTimeout(selectResultText, 0);
    }

    /***********************
     * ✅ 업로드 버튼만 눌러도:
     * 자동 생성 → 업로드 → 자동복사 → 자동선택
     ***********************/
    function ensureGenerated() {
      const activeTrouble = document.getElementById('troubleForm').classList.contains('active');
      if (activeTrouble) generateTroubleText();
      else generateParameterText();
    }

    async function uploadAndAutoCopy() {
      ensureGenerated();
      await uploadContent();
      setTimeout(selectResultText, 0);
    }

    /***********************
     * ✅ 업로드(GAS만) + 성공/실패 무조건 자동 복사
     * - CORS preflight 회피: text/plain
     ***********************/
    async function uploadContent() {
      const uploadButton = document.getElementById('uploadButton');
      const fullText = document.getElementById('resultText').innerText.trim();

      if (!fullText) {
        alert("내용이 없습니다. / No content.");
        return;
      }

      uploadButton.disabled = true;
      showToast("⏳ 시트 저장 중... / Saving to Google Sheet...");

      const isTrouble = fullText.startsWith("[부동&작업 공유");

      const troubleLabels = [
        "종류(type):",
        "0. Site (site) :",
        "1. 호기(machine) :",
        "2-1. 공정(process) :",
        "2-2. 유닛(unit) :",
        "2-3. 어셈블리(assy) :",
        "3-1. 발생시간(start time) :",
        "3-2. 조치완료(complete time) :",
        "4. 작업자(worker) :",
        "5. 현상(symptom) :",
        "6. 원인(cause) :",
        "7. 조치(action) :",
      ];

      const paraLabels = [
        "0. Site (site) :",
        "1. 호기(machine) :",
        "2-1. 공정(process) :",
        "2-2. 유닛(unit) :",
        "2-3. 어셈블리(assy) :",
        "3. 변경시간(change time) :",
        "4. 변경자(worker) :",
        "5. 변경Para(parameter) :",
        "6. 이전값(before) :",
        "7. 변경값(after) :",
        "8. 변경사유(reason) :",
      ];

      const getValue = (label) => {
        const labels = isTrouble ? troubleLabels : paraLabels;
        const start = fullText.indexOf(label);
        if (start === -1) return "";
        const valueStart = start + label.length;

        let nextIndex = fullText.length;
        for (const lb of labels) {
          if (lb === label) continue;
          const idx = fullText.indexOf(lb, valueStart);
          if (idx !== -1 && idx < nextIndex) nextIndex = idx;
        }
        return fullText.slice(valueStart, nextIndex).trim();
      };

      let data;
      if (isTrouble) {
        data = {
          type: getValue("종류(type):"),
          site: getValue("0. Site (site) :"),
          machine: "'" + getValue("1. 호기(machine) :"),
          process: getValue("2-1. 공정(process) :"),
          unit: getValue("2-2. 유닛(unit) :"),
          assy: getValue("2-3. 어셈블리(assy) :"),
          time: getValue("3-1. 발생시간(start time) :"),
          complete: getValue("3-2. 조치완료(complete time) :"),
          worker: getValue("4. 작업자(worker) :"),
          problem: getValue("5. 현상(symptom) :"),
          reason: getValue("6. 원인(cause) :"),
          action: getValue("7. 조치(action) :"),
        };
      } else {
        data = {
          type: "Para/IP 변경",
          site: getValue("0. Site (site) :"),
          machine: "'" + getValue("1. 호기(machine) :"),
          process: getValue("2-1. 공정(process) :"),
          unit: getValue("2-2. 유닛(unit) :"),
          assy: getValue("2-3. 어셈블리(assy) :"),
          time: getValue("3. 변경시간(change time) :"),
          worker: getValue("4. 변경자(worker) :"),
          problem: getValue("5. 변경Para(parameter) :"),
          reason: getValue("6. 이전값(before) :"),
          action: getValue("7. 변경값(after) :"),
          complete: getValue("8. 변경사유(reason) :"),
        };
      }

      try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(data),
        });

        const bodyText = await res.text();
        let json = {};
        try { json = JSON.parse(bodyText); } catch (_) {}

        if (!res.ok || json.result !== "success") {
          throw new Error(`GAS failed: status=${res.status}, body=${bodyText}`);
        }

        await copyTextSafe(fullText);
        showToast(`✅ 시트 저장 성공 (${json.sheet || "OK"})\n📋 클립보드 복사 완료!\n➡️ 카톡방에 붙여넣기 하세요.`);

      } catch (err) {
        console.error(err);

        await copyTextSafe(fullText);
        showToast("❌ 시트 저장 실패\n📋 내용은 클립보드에 복사했습니다.\n➡️ 카톡방에 붙여넣어 공유하세요.");
      } finally {
        uploadButton.disabled = false;
      }
    }

    /***********************
     * 초기 로드
     ***********************/
    window.addEventListener('load', () => {
      setCurrentDateTime('para-time');
      setCurrentDateTime('trouble-time');
      setCurrentDateTime('trouble-complete');

      updateMaxConstraints();
      completeEl.min = startEl.value;

      setOptions('para-machine', LH_MACHINES);
      setOptions('trouble-machine', LH_MACHINES);

      setProcessOptions('para-process');
      setProcessOptions('trouble-process');
    });
  </script>
