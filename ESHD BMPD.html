    <script>
       
// site 값에 따라 process 옵션 목록 정의
const siteToProcess = {
  L-H:       ['Electrode Supply', 'Lamination', 'Stacking', 'Taper', 'Inspection'],
  default:   ['Electrode Supply', 'Lamination', 'D-Stacking', 'Taper', 'Inspection']
};

const siteEl = document.getElementById('trouble-site');
const procEl = document.getElementById('trouble-process');
const siteE2 = document.getElementById('para-site');
const procE2 = document.getElementById('para-process');

// site 변경 시 process 옵션 업데이트 함수
function updateProcessOptions() {
    // siteToProcess[site] 가 없으면 default 사용
    const list = siteToProcess[siteEl.value] || siteToProcess.default;
    const list_para = siteToProcess[siteE2.value] || siteToProcess.default;

    // 기존 옵션 초기화
    procEl.innerHTML = '';
    procEl.appendChild(new Option('-', '-'));

    procE2.innerHTML = '';
    procE2.appendChild(new Option('-', '-'));

    // 새로 정의된 옵션 삽입
    list.forEach(p => {
        procEl.appendChild(new Option(p, p));
    });

    list_para.forEach(p => {
        procE2.appendChild(new Option(p, p));
    });

    // 선택 초기화
    procEl.value = '-';
    procE2.value = '-';
}

// 페이지 로드시와 site 변경 시에 호출
siteEl.addEventListener('change', updateProcessOptions);
siteE2.addEventListener('change', updateProcessOptions);
updateProcessOptions();  // 최초 로드시에도 적용

const MAIL_SUBJECT = 'ESHD L&S 공유(자동 발송)';

const statusMessage = document.getElementById('statusMessage');
const resultText = document.getElementById('resultText');
async function uploadContent() {
    // 1. DOM 요소 가져오기
    const uploadButton = document.getElementById('uploadButton');
    const resultText = document.getElementById('resultText');
    const statusAlert = document.getElementById('status-alert');
    const alertMessage = document.getElementById('alert-message');

    // 2. 업로드 시작: 버튼 비활성화, 알림창 표시 및 메시지 설정
    uploadButton.disabled = true;
    alertMessage.innerText = '⏳ 업로드 및 공유 진행 중...';
    statusAlert.classList.add('show');

    // 💡 핵심 수정 시작: 전체 텍스트를 가져와 멀티라인 파싱을 준비합니다.
    const fullText = resultText.innerText.trim();
    const isTrouble = fullText.startsWith("[부동&작업 공유]");

    // 라벨 목록 (generateTroubleText / generateParameterText와 반드시 동일해야 함)
    const troubleLabels = [
        "종류(Trouble):",
        "0. Site :",
        "1. 호기(Line) :",
        "2-1. Machine :",
        "2-2. Unit :",
        "2-3. Assy' :",
        "3-1. 발생시간(trouble-time) :",
        "3-2. 조치완료(trouble-complete) :",
        "4. 작업자(worker) :",
        "5. 현상(problem) :",
        "6. 원인(reason) :",
        "7. 조치(action) :",
    ];

    const paraLabels = [
        "0. Site :",
        "1. 호기(Line) :",
        "2-1. Machine :",
        "2-2. Unit :",
        "2-3. Assy' :",
        "3. 변경시간(Time) :",
        "4. 변경자(Worker) :",
        "5. 변경Para(Parameter) :",
        "6. 이전값(para-before) :",
        "7. 변경값(para-after) :",
        "8. 변경사유(reason) :",
    ];

    // ⚙️ 새 getValue: 정규식 안 쓰고, 라벨 위치로만 자르기
    const getValue = (label) => {
        const text = fullText;                 // uploadContent 안에 이미 있는 전체 문자열
        const labels = isTrouble ? troubleLabels : paraLabels;

        // 1) 이 라벨이 어디 있는지 찾기
        const start = text.indexOf(label);
        if (start === -1) return "";           // 라벨 없으면 빈 문자열

        const valueStart = start + label.length;

        // 2) 이 라벨 뒤에 나오는 "다음 라벨"의 위치를 찾기
        let nextIndex = text.length;
        for (const lb of labels) {
            if (lb === label) continue;        // 자기 자신은 건너뜀
            const idx = text.indexOf(lb, valueStart);
            if (idx !== -1 && idx < nextIndex) {
                nextIndex = idx;
            }
        }

        // 3) 현재 라벨 뒤부터, 다음 라벨 직전까지가 이 항목의 값
        const raw = text.slice(valueStart, nextIndex);

        return raw.trim();
    };

   
    let data;

    if (isTrouble) {
        data = {
            type: getValue("종류(Trouble):"),
            site: getValue("0. Site :"),
            machine: "'" + getValue("1. 호기(Line) :"),
            process: getValue("2-1. Machine :"),
            unit: getValue("2-2. Unit :"),
            assy: getValue("2-3. Assy' :"),
            time: getValue("3-1. 발생시간(trouble-time) :"),
            complete: getValue("3-2. 조치완료(trouble-complete) :"),
            worker: getValue("4. 작업자(worker) :"),
            // 👇 멀티라인 필드는 isMultiLine 인수를 사용하지 않고,
            //    정규식 내부에서 순서에 맞게 다음 라벨까지 추출하도록 설정했습니다.
            problem: getValue("5. 현상(problem) :"),
            reason: getValue("6. 원인(reason) :"),
            action: getValue("7. 조치(action) :"),
        };
    } else { // Para/IP 변경 폼
        data = {
            type: 'Para/IP 변경',
            site: getValue("0. Site :"),
            machine: "'" + getValue("1. 호기(Line) :"), // # 추가하든, ' ' ' 추가하든
            process: getValue("2-1. Machine :"),
            unit: getValue("2-2. Unit :"),
            assy: getValue("2-3. Assy' :"),
            time: getValue("3. 변경시간(Time) :"),
            // Para/IP 폼에서 'complete' 자리에 '8. 변경사유'가 들어감
            complete: getValue("8. 변경사유(reason) :"),
            worker: getValue("4. 변경자(Worker) :"),
            problem: getValue("5. 변경Para(Parameter) :"),
            reason: getValue("6. 이전값(para-before) :"),
            action: getValue("7. 변경값(para-after) :"),
            // '8. 변경사유(reason)'를 재사용하여 멀티라인으로 추출
            para_reason: getValue("8. 변경사유(reason) :"),
        };
        // Para/IP 폼에서는 'complete' 필드를 '8. 변경사유(reason)'로 사용하는 구조가
        // 데이터 전송에 문제가 있다면, 아래와 같이 'reason'과 동일하게 맞추는 것이 좋습니다.
        data.complete = data.para_reason;
        delete data.para_reason;
    }
   
    // 이 시점에서 data 객체의 'problem', 'reason', 'action' 값은
    // 입력된 여러 줄 내용(줄바꿈 문자 \n 포함)을 온전히 가지고 있습니다.
    // 따라서 백엔드(Sheets/Worker)로 전송되어도 줄바꿈이 유지됩니다.

    const WORKER_BASE = "https://fragrant-band-2b4e.limchickennn.workers.dev";
   
    const fetchPromises = [
        fetch("https://appendtosheet-ymlfqhclja-uc.a.run.app", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        }),
        fetch(`${WORKER_BASE}/pa`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        }),
    ];

    try {
        // 4. 모든 비동기 요청을 병렬로 실행
        await Promise.all(fetchPromises);
       
        // 5. 성공 시: 메시지 변경 및 공유 함수 호출 (shareContentWithRetry 함수는 그대로 있다고 가정)
        alertMessage.innerText = '✅ 공유 시트 업로드 성공!';
        shareContentWithRetry();

    } catch (error) {
        // 6. 실패 시: 메시지 변경 및 오류 로깅
        console.error("업로드 오류:", error);
        alertMessage.innerText = '❌ 업로드 중 오류 발생!';

    } finally {
        // 7. 일정 시간 후 알림창 숨기고, 버튼 활성화
        setTimeout(() => {
            statusAlert.classList.remove('show');
            uploadButton.disabled = false;
        }, 5000); // 5초 후에 알림창 숨김
    }
}


document.getElementById('para-site').addEventListener('change', function () {
    const site = this.value;
    const machineSelect = document.getElementById('para-machine');
    machineSelect.innerHTML = ''; // 기존 옵션 제거

    let options = [];
    if (site === 'L-H') {
        options = ['-', '1-1', '1-2', '1-3', '2-1', '2-2', '2-3','3-1', '3-2', '3-3', '4-1', '4-2', '4-3', '5-1', '5-2', '5-3', '6-1', '6-2', '6-3', '6-4','HC1', 'HC2']
    } else {
        options = ['기타']; // 다른 site 선택 시 기본 옵션
    }

    options.forEach(function (opt) {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt;
        machineSelect.appendChild(option);
    });
});

    } else {
        options = ['기타']; // 다른 site 선택 시 기본 옵션

        machineSelect.appendChild(option);

});


// 파라유닛 선택항목 함수
document.getElementById('para-process').addEventListener('change', function () {
    const site = document.getElementById('para-site').value;
    const process = this.value;
    const unitSelect = document.getElementById('para-unit');

    // 기존 옵션 제거
    unitSelect.innerHTML = '';

    let options = [];

    if (site === 'L-H') {
        if (process === 'Electrode Supply') {
            options = ['-', 'Electrode. Unwinder'];
        }

        // 페이지 로드 시 현재 시간 설정
        window.onload = function() {
            setCurrentDateTime('para-time');
            setCurrentDateTime('trouble-time');
            setCurrentDateTime('trouble-complete');
        };

        // 1) 요소 참조
        const startEl    = document.getElementById('trouble-time');
        const completeEl = document.getElementById('trouble-complete');

        // 2) 현재 시각 기준 +1일(24h) 계산 함수
        function getMaxIso() {
            const now     = new Date();
            const plusOne = new Date(now.getTime() + 24*60*60*1000);
            // datetime-local 에 맞춘 형식: YYYY-MM-DDThh:mm
            return plusOne.toISOString().slice(0,16);
        }

        // 3) max 속성 갱신 및 값 보정 함수
        function updateMaxConstraints() {
            const maxIso = getMaxIso();

            // 입력 필드의 max 속성 설정
            startEl.max    = maxIso;
            completeEl.max = maxIso;

            // 이미 선택된 값이 max를 넘었으면 보정
            if (startEl.value && startEl.value > maxIso) {
                startEl.value = maxIso;
                alert('⚠️ 발생시간은 현재 시각부터 24시간 이내여야 합니다.');
            }
            if (completeEl.value && completeEl.value > maxIso) {
                completeEl.value = maxIso;
                alert('⚠️ 조치완료 시간은 현재 시각부터 24시간 이내여야 합니다.');
            }
        }

        // 4) 페이지 로드 시, 발생시간 변경 시마다 max 갱신
        window.addEventListener('load', () => {
            updateMaxConstraints();
            // 이미 설정해둔 min 제약도 한 번 동기화
            completeEl.min = startEl.value;
            });
        startEl.addEventListener('change', () => {
            // min, max 둘 다 갱신
            completeEl.min = startEl.value;
            updateMaxConstraints();
            });
        completeEl.addEventListener('change', () => {
            updateMaxConstraints();
            // min 검사: 발생시간 이전이면 보정
            if (completeEl.value < startEl.value) {
                completeEl.value = startEl.value;
                alert('⚠️ 조치완료 시간은 발생시간 이후여야 합니다.');
            }
        });

       
        // 현재 시간 설정 함수
        function setCurrentDateTime(elementId) {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
           
            const dateTimeValue = `${year}-${month}-${day}T${hours}:${minutes}`;
            document.getElementById(elementId).value = dateTimeValue;
        }
       
        // 탭 전환 함수
        function switchTab(formId) {
            // 모든 탭과 폼 비활성화
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.form').forEach(form => {
                form.classList.remove('active');
            });
           
            // 선택된 탭과 폼 활성화
            if (formId === 'parameterForm') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('parameterForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('troubleForm').classList.add('active');
            }
           
            // 결과 숨기기
            document.getElementById('result').style.display = 'none';
        }
       
        // 날짜 형식화 함수
        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return '';
           
            const date = new Date(dateTimeStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hours = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, '0');
           
            const ampm = hours >= 12 ? '오후' : '오전';
            const hour12 = hours % 12 || 12;
           
            return `${year}년 ${month}월 ${day}일 ${ampm} ${hour12}:${minutes}`;
        }

        // 텍스트 복사 함수
        function copyText() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text)
                .then(() => {
                    alert('텍스트가 클립보드에 복사되었습니다.');
                })
                .catch(err => {
                    console.error('클립보드 복사 실패:', err);
                    alert('클립보드 복사에 실패했습니다. 수동으로 텍스트를 선택하여 복사하세요.');
                });
        }

        function copyTextSafe(text) {
            // 1) 최신 API 시도
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text).then(() => {
                    alert("✅ 텍스트가 클립보드에 복사되었습니다.");
                }).catch(err => {
                    console.warn("clipboard.writeText 실패:", err);
                    fallbackCopy(text);
                });
            } else {
                // 2) 보안환경 아님 → 폴백
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";  // 화면에 안 보이게
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();

            try {
                document.execCommand("copy");
                alert("✅ 텍스트가 클립보드에 복사되었습니다. (폴백)");
            } catch (err) {
                console.error("execCommand copy 실패:", err);
                alert("⚠️ 복사가 지원되지 않는 환경입니다. 직접 선택해서 복사해주세요.");
            } finally {
                document.body.removeChild(textarea);
            }
        }
       
        // 공유하기 함수
        function shareContent() {
            const text = document.getElementById('resultText').innerText;
            const title = 'ESHD JF2 공유 내용';
           
            // Web Share API 지원 확인
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: text
                })
                .then(() => {
                    console.log('공유 성공');
                })
                .catch((error) => {
                    console.log('공유 실패:', error);
                    // 공유 실패 시 클립보드에 복사
                    fallbackToCopy(text);
                });
            } else {
                // Web Share API를 지원하지 않는 경우 클립보드에 복사
                fallbackToCopy(text);
            }
        }

        async function shareContentWithRetry(maxRetries = 2) {
            const text = document.getElementById("resultText").innerText;
            const title = "ESHD L&S 공유 내용";

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    if (navigator.share) {
                        await navigator.share({ title: title, text: text });
                        console.log(`✅ 공유 성공 (시도 ${attempt})`);
                        return; // 성공 시 함수 종료
                    } else {
                        throw new Error("Web Share API 미지원");
                    }
                } catch (err) {
                    console.warn(`⚠️ 공유 실패 (시도 ${attempt}):`, err);

                    if (attempt === maxRetries) {
                        // 마지막 실패 → 클립보드 복사 폴백
                        copyTextSafe(text);
                        alert("⚠️ 공유가 반복 실패하여 클립보드에 복사했습니다.");
                    }
                }
            }
        }
       
        // 클립보드 복사 대체 방법
        function fallbackToCopy(text) {
            navigator.clipboard.writeText(text)
                .then(() => {
                    alert('텍스트가 클립보드에 복사되었습니다.');
                })
                .catch(err => {
                    console.error('클립보드 복사 실패:', err);
                    alert('클립보드 복사에 실패했습니다. 수동으로 텍스트를 선택하여 복사하세요.');
                });
        }
